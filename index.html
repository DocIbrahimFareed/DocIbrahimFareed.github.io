<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script src="https://cdn.tailwindcss.com"></script>
<title>MedQuiz</title>
</head>

<body class="bg-slate-100">

<!-- HEADER -->
<header class="bg-slate-900 text-white p-4 sticky top-0 z-50">
  <div class="max-w-4xl mx-auto flex justify-between items-center">
    <h1 class="text-lg font-bold">MedQuiz Pro</h1>
    <div id="stats" class="text-sm opacity-80"></div>
  </div>
</header>

<!-- CONTENT -->
<main class="max-w-4xl mx-auto p-3">

  <input id="search"
    class="w-full p-3 rounded-lg mb-4"
    placeholder="Search question number..."
  />

  <div id="quiz" class="space-y-4"></div>

  <div id="pagination"
    class="flex flex-wrap justify-center mt-6 gap-1"></div>

</main>

</body>
<script src="app.js"></script>
</html>
